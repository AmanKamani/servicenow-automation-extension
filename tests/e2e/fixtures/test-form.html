<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Form</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    .field-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 4px; font-weight: 600; }
    input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; font-size: 14px; }
    button { padding: 8px 16px; margin-right: 8px; cursor: pointer; }
    .hidden-section { display: none; }
    .hidden-section.visible { display: block; }
    #dialogLog { margin-top: 16px; padding: 12px; background: #f3f4f6; border-radius: 6px; min-height: 20px; }
  </style>
</head>
<body>
  <h1>Test Form</h1>

  <!-- Field found by label[for] strategy -->
  <div class="field-group">
    <label for="fullName">Full Name</label>
    <input type="text" id="fullName" name="fullName">
  </div>

  <!-- Field found by label[for] strategy -->
  <div class="field-group">
    <label for="email">Email Address</label>
    <input type="text" id="email" name="email">
  </div>

  <!-- Field found by aria-label strategy -->
  <div class="field-group">
    <input type="text" id="department" name="department" aria-label="Department">
  </div>

  <!-- Field found by placeholder strategy -->
  <div class="field-group">
    <input type="text" id="notes" name="notes" placeholder="Additional Notes">
  </div>

  <!-- Native select -->
  <div class="field-group">
    <label for="priority">Priority</label>
    <select id="priority" name="priority">
      <option value="">-- Select --</option>
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
      <option value="critical">Critical</option>
    </select>
  </div>

  <!-- Textarea found by label[for] -->
  <div class="field-group">
    <label for="description">Description</label>
    <textarea id="description" name="description" rows="3"></textarea>
  </div>

  <!-- Expand toggle hiding extra fields -->
  <div class="field-group">
    <button id="expandBtn" type="button" aria-expanded="false"
            onclick="toggleSection()">Show Advanced Options</button>
    <div id="advancedSection" class="hidden-section">
      <div class="field-group" style="margin-top: 12px;">
        <label for="advancedField">Advanced Setting</label>
        <input type="text" id="advancedField" name="advancedField">
      </div>
    </div>
  </div>

  <!-- Buttons that trigger dialogs -->
  <div class="field-group" style="margin-top: 24px;">
    <button id="submitBtn" type="button">Submit</button>
    <button id="deleteBtn" type="button">Delete</button>
    <button id="renameBtn" type="button">Rename</button>
  </div>

  <div id="dialogLog"></div>

  <script>
    function toggleSection() {
      const btn = document.getElementById("expandBtn");
      const section = document.getElementById("advancedSection");
      const expanded = btn.getAttribute("aria-expanded") === "true";
      btn.setAttribute("aria-expanded", String(!expanded));
      section.classList.toggle("visible", !expanded);
    }

    document.getElementById("submitBtn").addEventListener("click", function () {
      alert("Form submitted successfully!");
      document.getElementById("dialogLog").textContent = "submit:alert:dismissed";
    });

    document.getElementById("deleteBtn").addEventListener("click", function () {
      var result = confirm("Are you sure you want to delete?");
      document.getElementById("dialogLog").textContent = "delete:confirm:" + result;
    });

    document.getElementById("renameBtn").addEventListener("click", function () {
      var result = prompt("Enter new name:", "default");
      document.getElementById("dialogLog").textContent = "rename:prompt:" + result;
    });
  </script>
</body>
</html>
